<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Let it Cast — Clickable mobile demo</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="Interactive mobile demo — how a talent answers a casting call on Let it Cast.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Geist:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tokens.css">
<style>
  html, body { margin: 0; padding: 0; background: #0A0A0B; font-family: var(--font-ui); }
  body { min-height: 100vh; }

  /* iPhone bezel — same chrome the canvas demo uses, so the screens render
     pixel-identically. */
  .lic-phone {
    width: 402px; height: 870px;
    border-radius: 56px; overflow: hidden; position: relative;
    background: #000; padding: 10px;
    box-shadow: 0 40px 80px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.06);
  }
  .lic-phone-inner {
    position: relative; width: 100%; height: 100%;
    border-radius: 46px; overflow: hidden; background: #FAFAFB;
  }
  .lic-island {
    position: absolute; top: 18px; left: 50%; transform: translateX(-50%);
    width: 110px; height: 32px; border-radius: 999px; background: #000;
    z-index: 40; pointer-events: none;
  }
  .lic-home {
    position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
    width: 132px; height: 4px; border-radius: 999px;
    background: rgba(0,0,0,0.18); z-index: 50; pointer-events: none;
  }
  .lic-phone-dark .lic-home { background: rgba(255,255,255,0.6); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="lib.jsx"></script>
<script type="text/babel" src="screens-mobile.jsx"></script>
<script type="text/babel" src="selftape.jsx"></script>
<script type="text/babel" src="demo.jsx"></script>
</body>
</html>
