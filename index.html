<link rel="stylesheet" href="tokens.css">
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; font-family: var(--font-ui); }
  body { min-height: 100vh; }
  /* Mobile bezel */
  .lic-phone {
    width: 402px; height: 870px;
    border-radius: 56px; overflow: hidden; position: relative;
    background: #000; padding: 10px;
    box-shadow: 0 40px 80px rgba(10,10,11,0.18), 0 0 0 1px rgba(10,10,11,0.18);
  }
  .lic-phone-inner {
    position: relative; width: 100%; height: 100%;
    border-radius: 46px; overflow: hidden; background: #FAFAFB;
  }
  /* Dynamic island */
  .lic-island {
    position: absolute; top: 18px; left: 50%; transform: translateX(-50%);
    width: 110px; height: 32px; border-radius: 999px; background: #000;
    z-index: 40; pointer-events: none;
  }
  /* Home indicator */
  .lic-home {
    position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
    width: 132px; height: 4px; border-radius: 999px;
    background: rgba(0,0,0,0.18); z-index: 50; pointer-events: none;
  }
  .lic-phone-dark .lic-home { background: rgba(255,255,255,0.6); }

  /* Mac window-ish */
  .lic-mac {
    width: 1440px; height: 900px; border-radius: 14px; overflow: hidden;
    box-shadow: 0 30px 90px rgba(10,10,11,0.18), 0 0 0 1px rgba(10,10,11,0.1);
    background: #fff; position: relative;
    display: flex; flex-direction: column;
  }
  .lic-mac-bar {
    height: 32px; background: linear-gradient(180deg, #fbfbfc 0%, #eef0f4 100%);
    border-bottom: 1px solid #d4d6db;
    display: flex; align-items: center; padding: 0 14px; gap: 8px; flex-shrink: 0;
  }
  .lic-mac-bar .dot { width: 12px; height: 12px; border-radius: 50%; }
  .lic-mac-bar .url {
    margin: 0 auto; padding: 4px 14px; border-radius: 6px;
    font-family: var(--font-mono); font-size: 11px; color: #6b6b73;
    background: #fff; border: 1px solid #e2e4ea; display: flex; align-items: center; gap: 6px;
  }
  .lic-mac-body { flex: 1; overflow: hidden; }

  /* Section caption helper */
  .dc-section-note {
    font-family: var(--font-mono);
    font-size: 10px; color: rgba(60,50,40,0.6);
    letter-spacing: 0.06em; text-transform: uppercase;
  }
</style>
</head>
<body>
<div id="root"></div>
